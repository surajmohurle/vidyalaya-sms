<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidyalaya Dashboard</title>
    <link rel="stylesheet" href="/dashboard/style.css">
</head>
<body>
    <div id="auth-overlay">
        <div class="login-card">
            <h2 style="margin-bottom: 0.5rem">Welcome Back</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem">Login to your Vidyalaya account</p>
            <input type="email" id="email" placeholder="Email address">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleLogin()">Sign In</button>
            <p id="auth-error" style="color: #ef4444; margin-top:1rem; display:none; font-size: 0.875rem"></p>
        </div>
    </div>

    <div class="layout">
        <aside>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                Vidyalaya
            </div>
            <nav>
                <ul>
                    <li><a href="#" class="active" onclick="showSection('students')">Students</a></li>
                    <li><a href="#" onclick="showSection('academic')">Academic Years</a></li>
                    <li><a href="#" onclick="showSection('subjects')">Subjects</a></li>
                    <li><a href="#" onclick="showSection('grades')">Grades</a></li>
                </ul>
            </nav>
            <div style="margin-top: auto; padding-top: 2rem">
                <button onclick="handleLogout()" style="background:transparent; color: var(--text-muted); border:1px solid var(--border)">Sign Out</button>
            </div>
        </aside>

        <main>
            <header>
                <h1 id="section-title">Students Registry</h1>
                <div id="user-display" style="font-weight: 500; color: var(--text-muted)">Admin</div>
            </header>

            <div class="stats-grid">
                <div class="card">
                    <h3>Total Students</h3>
                    <p id="stat-students">--</p>
                </div>
                <div class="card">
                    <h3>Active Classes</h3>
                    <p id="stat-classes">--</p>
                </div>
                <div class="card">
                    <h3>Current Term</h3>
                    <p id="stat-term">2023/24</p>
                </div>
            </div>

            <div class="data-section">
                <table id="data-table">
                    <thead>
                        <tr id="table-head">
                            <!-- Dynamically populated -->
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Dynamically populated -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="/dashboard/app.js"></script>
</body>
</html>
